kind = "web"
previewPath = "/"
title = "Mortal Tech Store"
version = "1.0.0"
id = "artifacts/mortal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18944

[services.development]
run = "pnpm --filter @workspace/mortal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mortal", "run", "build" ]
publicDir = "artifacts/mortal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18944"
BASE_PATH = "/"
